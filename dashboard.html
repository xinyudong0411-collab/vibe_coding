<!DOCTYPE html>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .card { background: #1a1d2e; border: 1px solid #2d3048; border-radius: 12px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .tag-hold    { background: #1a3a2a; color: #4ade80; }
    .tag-t       { background: #1a2a3a; color: #60a5fa; }
    .tag-reduce  { background: #3a2a1a; color: #fb923c; }
    .tag-risk    { background: #3a1a1a; color: #f87171; }
    .tag-trend   { background: #1e2a1a; color: #86efac; border: 1px solid #166534; }
    .tag-vol     { background: #1e1a2a; color: #a78bfa; border: 1px solid #4c1d95; }
    .tag-dd      { background: #2a1a1a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .tag-press   { background: #2a2a1a; color: #fde68a; border: 1px solid #78350f; }
    .up   { color: #f87171; }
    .down { color: #4ade80; }
    .neutral { color: #94a3b8; }
    .section-title { font-size: 13px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .fund-card { background: #12152a; border: 1px solid #252840; border-radius: 10px; padding: 14px; transition: border-color 0.2s; cursor: pointer; }
    .fund-card:hover { border-color: #4f52a0; }
    .radar-label { font-size: 12px; fill: #94a3b8; }
    .progress-bar { height: 6px; border-radius: 3px; background: #1e2035; }
    .progress-fill { height: 6px; border-radius: 3px; }
    .market-badge { border-radius: 8px; padding: 10px 16px; text-align: center; }
    .suggest-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #1e2035; }
    .suggest-item:last-child { border-bottom: none; }
    select, input { background: #12152a; border: 1px solid #2d3048; color: #e2e8f0; border-radius: 6px; padding: 4px 8px; font-size: 13px; }
    select:focus, input:focus { outline: none; border-color: #4f52a0; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">

     JAVASCRIPT
     ============================================================ -->
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct  = n => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const cls  = n => n >= 0 ? 'up' : 'down';

const poolMeta = {
  hold:   { label: '持有池',    desc: '适合继续持有',        color: '#4ade80', bg: '#0f2a1a' },
  t:      { label: '做T观察池', desc: '波动大，可高抛低吸',  color: '#60a5fa', bg: '#0f1a2a' },
  reduce: { label: '减仓池',    desc: '盈利高或风险上升',    color: '#fb923c', bg: '#2a1a0f' },
  risk:   { label: '风险池',    desc: '趋势走弱/回撤较大',   color: '#f87171', bg: '#2a0f0f' },
};

// ── Render Overview ──────────────────────────────────────────────────────────
function renderOverview() {
  const d = MOCK;
  document.getElementById('updateTime').textContent = '数据更新时间：' + new Date().toLocaleString('zh-CN');

  document.getElementById('ov-asset').textContent = '¥' + fmt(d.totalAsset);

  const retEl = document.getElementById('ov-return');
  retEl.textContent = pct(d.totalReturn);
  retEl.className = 'text-2xl font-bold ' + cls(d.totalReturn);

  const totalCost = d.totalAsset / (1 + d.totalReturn / 100);
  const retAbs = d.totalAsset - totalCost;
  document.getElementById('ov-returnAbs').textContent = (retAbs >= 0 ? '+' : '') + '¥' + fmt(retAbs);

  const todayEl = document.getElementById('ov-today');
  todayEl.textContent = (d.todayChange >= 0 ? '+' : '') + '¥' + fmt(d.todayChange);
  todayEl.className = 'text-2xl font-bold ' + cls(d.todayChange);
  document.getElementById('ov-todayPct').textContent = pct(d.todayChangePct);

  const riskEl = document.getElementById('ov-risk');
  riskEl.textContent = d.riskLevel + '风险';
  const riskColors = { '低': 'text-green-400', '中': 'text-yellow-400', '高': 'text-red-400' };
  riskEl.className = 'text-2xl font-bold ' + (riskColors[d.riskLevel] || 'text-white');
  const riskDescs = { '低': '仓位分散均衡', '中': '局部集中，注意分散', '高': '集中度过高，建议分散' };
  document.getElementById('ov-riskDesc').textContent = riskDescs[d.riskLevel] || '';
}

// ── Render Market ─────────────────────────────────────────────────────────────
function renderMarket() {
  const m = MOCK.market;
  const statusEl = document.getElementById('mkt-status');
  statusEl.textContent = m.status;
  const boxEl = document.getElementById('mkt-status-box');
  const statusColors = {
    strong: 'bg-red-900/30 border border-red-800/40',
    mid:    'bg-yellow-900/30 border border-yellow-800/40',
    weak:   'bg-slate-800/40 border border-slate-700/40',
  };
  const statusTextColors = { strong: 'text-red-300', mid: 'text-yellow-300', weak: 'text-slate-300' };
  boxEl.className = 'market-badge ' + (statusColors[m.statusCode] || '');
  statusEl.className = 'font-bold text-base ' + (statusTextColors[m.statusCode] || 'text-white');

  document.getElementById('mkt-style').textContent = m.style;

  const sentBar = document.getElementById('mkt-sentiment-bar');
  sentBar.style.width = m.sentiment + '%';
  if (m.sentiment > 70) sentBar.classList.add('from-yellow-500', 'to-red-500');
  document.getElementById('mkt-sentiment-val').textContent = m.sentiment + ' / 100';

  const hotEl = document.getElementById('hot-sectors');
  hotEl.innerHTML = m.hotSectors.map(s =>
    `<span class="tag" style="background:#1a3a2a;color:#4ade80">${s}</span>`).join('');

  const riskEl = document.getElementById('risk-sectors');
  riskEl.innerHTML = m.riskSectors.map(s =>
    `<span class="tag" style="background:#3a1a1a;color:#f87171">${s}</span>`).join('');
}

// ── Render Suggestions ────────────────────────────────────────────────────────
function renderSuggestions() {
  const el = document.getElementById('suggestions-list');
  el.innerHTML = MOCK.suggestions.map(s => `
    <div class="suggest-item">
      <span class="text-xl mt-0.5">${s.icon}</span>
      <div>
        <span class="tag tag-${s.type} mr-2">${
          { hold:'持有', t:'做T', reduce:'减仓', risk:'风险' }[s.type]
        }</span>
        <span class="text-sm text-slate-300">${s.text}</span>
      </div>
    </div>
  `).join('');
}

// ── Sector Chart ──────────────────────────────────────────────────────────────
function renderSectorChart() {
  const colors = ['#6366f1','#22d3ee','#a3e635','#fb923c','#f472b6','#94a3b8'];
  const data = MOCK.sectors;
  const ctx = document.getElementById('sectorChart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: data.map(s => s.name),
      datasets: [{ data: data.map(s => s.pct), backgroundColor: colors, borderWidth: 0 }],
    },
    options: {
      cutout: '65%',
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.label}  ${ctx.parsed}%` }
      }},
    },
  });

  const legend = document.getElementById('sector-legend');
  legend.innerHTML = data.map((s, i) => `
    <div class="flex items-center justify-between text-xs">
      <div class="flex items-center gap-2">
        <span class="w-2.5 h-2.5 rounded-full inline-block" style="background:${colors[i]}"></span>
        <span class="text-slate-300">${s.name}</span>
      </div>
      <div class="flex gap-3">
        <span class="text-slate-400">${s.pct}%</span>
        <span class="tag tag-${s.risk === '高' ? 'risk' : s.risk === '中' ? 't' : 'hold'}">${s.risk}险</span>
      </div>
    </div>
  `).join('');
}

// ── Radar Chart ───────────────────────────────────────────────────────────────
function renderRadarChart() {
  const r = MOCK.radar;
  const ctx = document.getElementById('radarChart').getContext('2d');
  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['仓位集中度', '波动资产占比', '回撤风险', '流动性', '板块相关性'],
      datasets: [{
        data: [r.concentration, r.volatility, r.drawdown, r.liquidity, r.correlation],
        backgroundColor: 'rgba(99,102,241,0.2)',
        borderColor: '#6366f1',
        pointBackgroundColor: '#6366f1',
        borderWidth: 2,
        pointRadius: 4,
      }],
    },
    options: {
      scales: {
        r: {
          min: 0, max: 100,
          grid: { color: '#2d3048' },
          angleLines: { color: '#2d3048' },
          pointLabels: { color: '#94a3b8', font: { size: 11 } },
          ticks: { display: false },
        },
      },
      plugins: { legend: { display: false } },
    },
  });
}

// ── Fund Cards ────────────────────────────────────────────────────────────────
function renderFunds() {
  const sortBy    = document.getElementById('sort-select').value;
  const filterSec = document.getElementById('filter-sector').value;
  const filterPool= document.getElementById('filter-pool').value;

  let funds = [...MOCK.funds];
  if (filterSec)  funds = funds.filter(f => f.sector === filterSec);
  if (filterPool) funds = funds.filter(f => f.pool === filterPool);

  const sortFns = {
    return: (a, b) => b.return - a.return,
    amount: (a, b) => b.amount - a.amount,
    risk:   (a, b) => {
      const o = { risk: 0, reduce: 1, t: 2, hold: 3 };
      return o[a.pool] - o[b.pool];
    },
  };
  funds.sort(sortFns[sortBy] || sortFns.return);

  // Group by pool
  const pools = { hold: [], t: [], reduce: [], risk: [] };
  funds.forEach(f => { if (pools[f.pool]) pools[f.pool].push(f); });

  const grid = document.getElementById('pool-grid');
  grid.innerHTML = Object.entries(pools).map(([pool, items]) => {
    const meta = poolMeta[pool];
    return `
      <div>
        <div class="flex items-center justify-between mb-2">
          <div>
            <span class="font-semibold text-sm" style="color:${meta.color}">${meta.label}</span>
            <span class="text-xs text-slate-500 ml-2">(${items.length}只)</span>
          </div>
          <span class="text-xs text-slate-600">${meta.desc}</span>
        </div>
        <div class="space-y-2">
          ${items.length === 0
            ? `<p class="text-xs text-slate-600 py-3 text-center">暂无持仓</p>`
            : items.map(f => fundCard(f)).join('')
          }
        </div>
      </div>
    `;
  }).join('');
}

function fundCard(f) {
  const tagMap = { hold:'tag-hold', t:'tag-t', reduce:'tag-reduce', risk:'tag-risk' };
  const subMap = { '趋势强':'tag-trend', '波动大':'tag-vol', '回撤扩大':'tag-dd', '板块承压':'tag-press', '涨幅过快':'tag-press', '':'hidden' };
  return `
    <div class="fund-card" onclick="showDetail('${f.code}')">
      <div class="flex justify-between items-start mb-2">
        <div>
          <p class="text-sm font-semibold text-white">${f.name}</p>
          <p class="text-xs text-slate-500">${f.code} · ${f.sector}</p>
        </div>
        <div class="text-right">
          <p class="text-sm font-bold ${cls(f.return)}">${pct(f.return)}</p>
          <p class="text-xs ${cls(f.returnAbs)}">${f.returnAbs >= 0 ? '+' : ''}¥${fmt(f.returnAbs)}</p>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <div class="flex gap-1.5 flex-wrap">
          <span class="tag ${tagMap[f.pool]}">${f.label}</span>
          ${f.subLabel ? `<span class="tag ${subMap[f.subLabel] || ''}">${f.subLabel}</span>` : ''}
        </div>
        <p class="text-xs text-slate-500">¥${fmt(f.amount)}</p>
      </div>
      <p class="text-xs text-slate-500 mt-2 border-t border-slate-800 pt-2">${f.suggestion}</p>
    </div>
  `;
}

function showDetail(code) {
  const f = MOCK.funds.find(x => x.code === code);
  if (!f) return;
  const meta = poolMeta[f.pool];
  document.getElementById('detail-content').innerHTML = `
    <div class="mb-4">
      <span class="tag tag-${f.pool} mb-2 inline-block">${f.label}</span>
      <h2 class="text-lg font-bold text-white">${f.name}</h2>
      <p class="text-xs text-slate-500">${f.code} · ${f.sector}</p>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-slate-800/50 rounded-lg p-3">
        <p class="text-xs text-slate-500 mb-1">持有金额</p>
        <p class="font-bold text-white">¥${fmt(f.amount)}</p>
      </div>
      <div class="bg-slate-800/50 rounded-lg p-3">
        <p class="text-xs text-slate-500 mb-1">收益率</p>
        <p class="font-bold ${cls(f.return)}">${pct(f.return)}</p>
      </div>
      <div class="bg-slate-800/50 rounded-lg p-3">
        <p class="text-xs text-slate-500 mb-1">收益额</p>
        <p class="font-bold ${cls(f.returnAbs)}">${f.returnAbs >= 0 ? '+' : ''}¥${fmt(f.returnAbs)}</p>
      </div>
      <div class="bg-slate-800/50 rounded-lg p-3">
        <p class="text-xs text-slate-500 mb-1">成本价</p>
        <p class="font-bold text-white">¥${fmt(f.cost)}</p>
      </div>
    </div>
    <div class="space-y-3">
      <div class="rounded-lg p-3" style="background:${meta.bg}20;border:1px solid ${meta.color}30">
        <p class="text-xs font-semibold mb-1" style="color:${meta.color}">决策建议</p>
        <p class="text-sm text-slate-200">${f.suggestion}</p>
      </div>
      <div class="bg-slate-800/30 rounded-lg p-3">
        <p class="text-xs text-slate-500 mb-1">分析原因</p>
        <p class="text-sm text-slate-300">${f.reason}</p>
      </div>
      <div class="bg-red-900/20 border border-red-900/30 rounded-lg p-3">
        <p class="text-xs text-red-400 mb-1">⚠ 风险提示</p>
        <p class="text-sm text-slate-300">${f.riskNote}</p>
      </div>
    </div>
  `;
  document.getElementById('detail-modal').classList.remove('hidden');
}

// ── Filter sector options ─────────────────────────────────────────────────────
function initSectorFilter() {
  const sectors = [...new Set(MOCK.funds.map(f => f.sector))];
  const sel = document.getElementById('filter-sector');
  sectors.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
}

// ── Modals ────────────────────────────────────────────────────────────────────
function showImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function showManualEntry() { document.getElementById('manual-entry').classList.toggle('hidden'); }

function refreshDashboard() {
  document.getElementById('updateTime').textContent = '数据更新时间：' + new Date().toLocaleString('zh-CN');
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderOverview();
  renderMarket();
  renderSuggestions();
  renderSectorChart();
  renderRadarChart();
  initSectorFilter();
  renderFunds();
});
</script>
</body>
